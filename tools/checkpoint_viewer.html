<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkpoint Viewer</title>
<link rel="stylesheet" href="./checkpoint_viewer.css">
</head>
<body>
<div class="app">
	<div class="toolbar">
		<h1>Checkpoint Viewer</h1>
		<input id="fileInput" type="file" webkitdirectory directory multiple>
		<span class="hint">选择 checkpoint 文件夹，自动扫描其中可用的 tick 数据</span>
	</div>
	<div class="panel logs-panel">
		<div class="logs-head">
			<h2>Playback Log</h2>
			<div class="log-filter-wrap">
				<button id="logFilterBtn" class="log-filter-btn" type="button">筛选</button>
				<div id="logFilterMenu" class="log-filter-menu" hidden>
					<div class="filter-group-title">类型</div>
					<label class="filter-check"><input id="logFilterInteraction" type="checkbox" checked>interaction</label>
					<label class="filter-check"><input id="logFilterEvent" type="checkbox" checked>event</label>
					<div class="filter-group-title">事件类型</div>
					<div id="logFilterEventTypes" class="event-type-empty">加载后可筛选</div>
					<div class="filter-group-title">关键词</div>
					<input id="logFilterKeyword" class="filter-search" type="text" placeholder="搜索文本/角色/事件">
					<div class="filter-actions">
						<button id="logFilterClearBtn" class="filter-clear-btn" type="button">重置</button>
					</div>
				</div>
			</div>
		</div>
		<div id="logList" class="log-list"></div>
	</div>
	<div class="panel world">
		<h2 id="worldTitle">World</h2>
		<div id="worldGrid" class="world-graph"></div>
	</div>
	<div class="panel details">
		<h2>Details</h2>
		<div id="detailsPane" class="empty">选择一个 tick、地点或实体</div>
	</div>
	<div class="panel timeline-bar">
		<h2>Timeline</h2>
		<div class="timeline-controls">
			<button id="prevTickBtn" class="timeline-btn">上一帧</button>
			<button id="playPauseBtn" class="timeline-btn primary">播放</button>
			<input id="tickSlider" class="timeline-slider" type="range" min="0" max="0" step="1" value="0">
			<div id="tickLabel" class="timeline-label">Tick -</div>
			<button id="nextTickBtn" class="timeline-btn">下一帧</button>
		</div>
		<div id="tickList" class="tick-markers"></div>
	</div>
</div>

<input id="imagePickerInput" type="file" accept="image/*" hidden>
<script src="./checkpoint_viewer.js"></script>
</body>
</html>
